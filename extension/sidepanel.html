<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booru Prompt Gallery Sidebar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    /* ── Theme tokens ───────────────────────────────────────────────────────
       Values mirror the app design tokens in globals.css so the native wrapper
       feels like the same app, not a different shell. Resolution order:
         1. :root defaults → DARK (matches app default on dark OS)
         2. @media (prefers-color-scheme: light) → LIGHT first-paint fallback
         3. :root[data-theme="dark|light"] → EXPLICIT override pushed by the app
            via postMessage (THEME_CHANGE). Attribute selectors out-specify the
            bare :root rules above, so a manual in-app theme choice always wins. */
    :root {
      --w-bg: #20283C;        /* --background 222 30% 18% */
      --w-fg: #E6EBF0;        /* --foreground 210 25% 92% */
      --w-bar-bg: #283248;    /* --card 222 28% 22% */
      --w-border: #434C60;    /* --border 222 18% 32% */
      --w-muted-fg: #C2C9D6;  /* --muted-foreground 214 18% 80% */
      --w-btn-bg: #353F54;    /* --secondary 222 22% 28% */
      --w-btn-fg: #E6EBF0;
      --w-btn-hover-bg: #434C60;
      --w-btn-hover-fg: #ffffff;
      --w-accent: #7E5BD6;    /* --primary (dark) 265 60% 63% */
      --w-accent-border: #9A7DE0;
    }
    /* First-paint fallback before the app reports its resolved theme. */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --w-bg: #F6F9FB;        /* --background 210 25% 98% */
        --w-fg: #0F172A;        /* --foreground 222 47% 11% */
        --w-bar-bg: #E9EDF2;    /* --secondary 220 14% 92% */
        --w-border: #CCD5E0;    /* --border 215 22% 85% */
        --w-muted-fg: #5B6472;  /* --muted-foreground 220 9% 40% */
        --w-btn-bg: #E9EDF2;
        --w-btn-fg: #1E293B;    /* --secondary-foreground 222 47% 17% */
        --w-btn-hover-bg: #DCE2EB;
        --w-btn-hover-fg: #0F172A;
        --w-accent: #7842D7;    /* --primary (light) 262 65% 55% */
        --w-accent-border: #946CE0;
      }
    }
    /* Explicit overrides from the app (win over OS preference). */
    :root[data-theme="dark"] {
      --w-bg: #20283C; --w-fg: #E6EBF0; --w-bar-bg: #283248; --w-border: #434C60;
      --w-muted-fg: #C2C9D6; --w-btn-bg: #353F54; --w-btn-fg: #E6EBF0;
      --w-btn-hover-bg: #434C60; --w-btn-hover-fg: #ffffff;
      --w-accent: #7E5BD6; --w-accent-border: #9A7DE0;
    }
    :root[data-theme="light"] {
      --w-bg: #F6F9FB; --w-fg: #0F172A; --w-bar-bg: #E9EDF2; --w-border: #CCD5E0;
      --w-muted-fg: #5B6472; --w-btn-bg: #E9EDF2; --w-btn-fg: #1E293B;
      --w-btn-hover-bg: #DCE2EB; --w-btn-hover-fg: #0F172A;
      --w-accent: #7842D7; --w-accent-border: #946CE0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--w-bg);
      color: var(--w-fg);
      /* Smooth the wrapper recolor when the app reports a theme change. */
      transition: background-color 150ms cubic-bezier(0.4, 0, 0.2, 1),
                  color 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* ── Dev/Prod Switcher Bar (dev-only; hidden for end users) ────────────── */
    .config-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--w-bar-bg);
      border-bottom: 1px solid var(--w-border);
      padding: 4px 10px;
      font-size: 10px;
      height: 28px;
      flex-shrink: 0;
    }
    .config-bar[hidden] {
      display: none;
    }
    .config-bar span {
      font-weight: 500;
      color: var(--w-muted-fg);
    }
    .btn-group {
      display: flex;
      gap: 5px;
    }
    .btn {
      background-color: var(--w-btn-bg);
      border: 1px solid var(--w-border);
      color: var(--w-btn-fg);
      padding: 2px 6px;
      border-radius: 6px; /* match app radius scale (sm) */
      cursor: pointer;
      font-size: 9px;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: var(--w-btn-hover-bg);
      color: var(--w-btn-hover-fg);
    }
    .btn.active {
      background-color: var(--w-accent);
      border-color: var(--w-accent-border);
      color: #fff;
      font-weight: 600;
    }

    /* ── App iframe ────────────────────────────────────────────────────────── */
    iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background-color: transparent;
      min-height: 0; /* allow flex shrink */
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Dev/Prod environment switcher. Hidden for end users; revealed by
         sidepanel.js only when localStorage "booru_sidebar_devmode" === "1". -->
    <div id="config-bar" class="config-bar" hidden>
      <span>Environment:</span>
      <div class="btn-group">
        <button id="btn-local" class="btn active" data-url="http://localhost:3000/extension">Local (Dev)</button>
        <button id="btn-prod" class="btn" data-url="https://booru-prompt-gallery.vercel.app/extension">Production</button>
      </div>
    </div>

    <!-- The actual hosted app iframe. Defaults to production; sidepanel.js swaps
         to localhost only when dev mode is enabled. The queue / target UI is
         rendered inside this React app, not by the host page. -->
    <iframe id="app-frame" src="https://booru-prompt-gallery.vercel.app/extension" allow="clipboard-write"></iframe>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
