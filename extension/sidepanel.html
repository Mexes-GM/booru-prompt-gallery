<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booru Prompt Gallery Sidebar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
    }
    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* ── Dev/Prod Switcher Bar ─────────────────────────────── */
    .config-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #18181b;
      border-bottom: 1px solid #27272a;
      padding: 4px 10px;
      font-size: 10px;
      height: 28px;
      flex-shrink: 0;
    }
    .config-bar span {
      font-weight: 500;
      color: #a1a1aa;
    }
    .btn-group {
      display: flex;
      gap: 5px;
    }
    .btn {
      background-color: #27272a;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #3f3f46;
      color: #fff;
    }
    .btn.active {
      background-color: #3b82f6;
      border-color: #60a5fa;
      color: #fff;
      font-weight: 600;
    }

    /* ── Queue Status Bar ──────────────────────────────────── */
    #queue-bar {
      display: none; /* shown via JS when queue is active */
      align-items: center;
      gap: 6px;
      background-color: #0f0f11;
      border-bottom: 1px solid #27272a;
      padding: 3px 10px;
      font-size: 9.5px;
      height: 24px;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Animated status dot */
    .queue-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 0.3s;
    }
    .queue-dot.idle {
      background-color: #22c55e; /* green */
    }
    .queue-dot.queued {
      background-color: #f59e0b; /* amber */
      animation: pulse-amber 1.5s ease-in-out infinite;
    }
    .queue-dot.generating {
      background-color: #3b82f6; /* blue */
      animation: pulse-blue 1s ease-in-out infinite;
    }
    .queue-dot.waiting {
      background-color: #f97316; /* orange */
      animation: pulse-orange 1.2s ease-in-out infinite;
    }

    @keyframes pulse-amber {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes pulse-blue {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.25); }
    }
    @keyframes pulse-orange {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.15); }
    }

    #queue-status-text {
      color: #a1a1aa;
      font-weight: 500;
      flex-shrink: 0;
    }

    #queue-badge {
      display: none;
      align-items: center;
      gap: 3px;
      background-color: #1d4ed8;
      color: #bfdbfe;
      padding: 1px 5px;
      border-radius: 9999px;
      font-size: 8.5px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Spacer to push clear btn right */
    .queue-spacer {
      flex: 1;
    }

    #queue-clear-btn {
      display: none;
      align-items: center;
      gap: 3px;
      background: transparent;
      border: 1px solid #3f3f46;
      color: #71717a;
      padding: 1px 5px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 8.5px;
      font-family: inherit;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #queue-clear-btn:hover {
      border-color: #ef4444;
      color: #f87171;
      background-color: #450a0a30;
    }

    #queue-target-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: transparent;
      border: 1px solid #3f3f46;
      color: #71717a;
      padding: 1px 5px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 8.5px;
      font-family: inherit;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #queue-target-btn:hover {
      border-color: #22c55e;
      color: #4ade80;
      background-color: #052e1630;
    }

    /* ── iframe ────────────────────────────────────────────── */
    iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background-color: transparent;
      min-height: 0; /* allow flex shrink */
    }

    /* ── Light Mode Themes ────────────────────────────────── */
    @media (prefers-color-scheme: light) {
      html, body {
        background-color: #ffffff;
        color: #09090b;
      }
      .config-bar {
        background-color: #f4f4f5;
        border-bottom: 1px solid #e4e4e7;
      }
      .config-bar span {
        color: #71717a;
      }
      .btn {
        background-color: #e4e4e7;
        border: 1px solid #d4d4d8;
        color: #27272a;
      }
      .btn:hover {
        background-color: #d4d4d8;
        color: #09090b;
      }
      .btn.active {
        background-color: #2563eb;
        border-color: #3b82f6;
        color: #fff;
      }
      #queue-bar {
        background-color: #fafafa;
        border-bottom: 1px solid #e4e4e7;
      }
      #queue-status-text {
        color: #71717a;
      }
      #queue-clear-btn {
        border: 1px solid #d4d4d8;
        color: #71717a;
      }
      #queue-clear-btn:hover {
        border-color: #ef4444;
        color: #ef4444;
        background-color: #fee2e2;
      }
      #queue-target-btn {
        border: 1px solid #d4d4d8;
        color: #71717a;
      }
      #queue-target-btn:hover {
        border-color: #22c55e;
        color: #16a34a;
        background-color: #dcfce7;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Dev/Prod environment switcher -->
    <div class="config-bar">
      <span>Environment:</span>
      <div class="btn-group">
        <button id="btn-local" class="btn active" data-url="http://localhost:3000/extension">Local (Dev)</button>
        <button id="btn-prod" class="btn" data-url="https://booru-prompt-gallery.netlify.app/extension">Production</button>
      </div>
    </div>

    <!-- Queue Status Bar (hidden by default, shown when queue is active) -->
    <div id="queue-bar">
      <span id="queue-status-dot" class="queue-dot idle"></span>
      <span id="queue-status-text">Ready</span>
      <span id="queue-badge">0 queued</span>
      <span class="queue-spacer"></span>
      <button id="queue-target-btn" title="Select target textarea on page">🎯 Target</button>
      <button id="queue-clear-btn" title="Clear prompt queue">✕ Clear</button>
    </div>

    <!-- The actual hosted app iframe -->
    <iframe id="app-frame" src="http://localhost:3000/extension" allow="clipboard-write"></iframe>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
