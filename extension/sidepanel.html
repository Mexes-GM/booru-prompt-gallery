<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booru Prompt Gallery Sidebar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
    }
    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* ── Dev/Prod Switcher Bar ─────────────────────────────── */
    .config-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #18181b;
      border-bottom: 1px solid #27272a;
      padding: 4px 10px;
      font-size: 10px;
      height: 28px;
      flex-shrink: 0;
    }
    .config-bar span {
      font-weight: 500;
      color: #a1a1aa;
    }
    .btn-group {
      display: flex;
      gap: 5px;
    }
    .btn {
      background-color: #27272a;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #3f3f46;
      color: #fff;
    }
    .btn.active {
      background-color: #3b82f6;
      border-color: #60a5fa;
      color: #fff;
      font-weight: 600;
    }

    /* ── Queue Floating Badge ──────────────────────────────────── */
    #queue-container {
      position: fixed;
      bottom: 24px;
      right: 50%;
      transform: translateX(50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1000;
      pointer-events: none;
      width: max-content;
      max-width: 95vw;
    }

    #target-info-pill {
      display: none;
      background-color: rgba(24, 24, 27, 0.95); /* zinc-900 */
      border: 1px solid #27272a; /* zinc-800 */
      backdrop-filter: blur(12px);
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
      color: #a1a1aa; /* zinc-400 */
      pointer-events: auto;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -2px rgba(0, 0, 0, 0.5);
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    #target-info-platform {
      color: #fafafa;
      font-weight: 600;
      margin-left: 4px;
    }

    #queue-bar {
      display: none; /* shown via JS when queue is active */
      align-items: center;
      gap: 10px;
      background-color: rgba(24, 24, 27, 0.95); /* zinc-900 */
      backdrop-filter: blur(12px);
      border: 1px solid #3f3f46; /* zinc-700 */
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      white-space: nowrap;
    }

    /* Animated status dot */
    .queue-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 0.3s;
    }
    .queue-dot.idle {
      background-color: #22c55e; /* green */
    }
    .queue-dot.queued {
      background-color: #f59e0b; /* amber */
      animation: pulse-amber 1.5s ease-in-out infinite;
    }
    .queue-dot.generating {
      background-color: #3b82f6; /* blue */
      animation: pulse-blue 1s ease-in-out infinite;
    }
    .queue-dot.waiting {
      background-color: #f97316; /* orange */
      animation: pulse-orange 1.2s ease-in-out infinite;
    }

    @keyframes pulse-amber {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes pulse-blue {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.25); }
    }
    @keyframes pulse-orange {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.15); }
    }
    .queue-dot.error {
      background-color: #ef4444; /* red */
      animation: pulse-red 0.8s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.3); }
    }

    #queue-status-text {
      color: #e4e4e7; /* zinc-200 */
      font-weight: 600;
      flex-shrink: 0;
    }

    #queue-badge {
      display: none;
      align-items: center;
      gap: 3px;
      background-color: #1d4ed8;
      color: #bfdbfe;
      padding: 1px 5px;
      border-radius: 9999px;
      font-size: 8.5px;
      font-weight: 600;
      flex-shrink: 0;
    }

    #queue-clear-btn {
      display: none;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      padding: 3px 10px;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #queue-clear-btn:hover {
      border-color: #ef4444;
      color: #fca5a5;
      background-color: rgba(239, 68, 68, 0.1);
    }

    #queue-target-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      padding: 3px 10px;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #queue-target-btn:hover {
      border-color: #22c55e;
      color: #86efac;
      background-color: rgba(34, 197, 94, 0.1);
    }

    /* ── Light Mode Themes ────────────────────────────────── */
    iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background-color: transparent;
      min-height: 0; /* allow flex shrink */
    }

    /* ── Light Mode Themes ────────────────────────────────── */
    @media (prefers-color-scheme: light) {
      html, body {
        background-color: #ffffff;
        color: #09090b;
      }
      .config-bar {
        background-color: #f4f4f5;
        border-bottom: 1px solid #e4e4e7;
      }
      .config-bar span {
        color: #71717a;
      }
      .btn {
        background-color: #e4e4e7;
        border: 1px solid #d4d4d8;
        color: #27272a;
      }
      .btn:hover {
        background-color: #d4d4d8;
        color: #09090b;
      }
      .btn.active {
        background-color: #2563eb;
        border-color: #3b82f6;
        color: #fff;
      }
      #queue-bar {
        background-color: #fafafa;
        border-bottom: 1px solid #e4e4e7;
      }
      #queue-status-text {
        color: #71717a;
      }
      #queue-clear-btn {
        border: 1px solid #d4d4d8;
        color: #71717a;
      }
      #queue-clear-btn:hover {
        border-color: #ef4444;
        color: #ef4444;
        background-color: #fee2e2;
      }
      #queue-target-btn {
        border: 1px solid #d4d4d8;
        color: #71717a;
      }
      #queue-target-btn:hover {
        border-color: #22c55e;
        color: #16a34a;
        background-color: #dcfce7;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Dev/Prod environment switcher -->
    <div class="config-bar">
      <span>Environment:</span>
      <div class="btn-group">
        <button id="btn-local" class="btn active" data-url="http://localhost:3000/extension">Local (Dev)</button>
        <button id="btn-prod" class="btn" data-url="https://booru-prompt-gallery.netlify.app/extension">Production</button>
      </div>
    </div>

    <!-- Queue Floating Badge (Now rendered inside React app, hidden here) -->
    <div id="queue-container" style="display: none !important;">
      <div id="target-info-pill">
        Target: <span id="target-info-platform">Unknown</span>
      </div>
      <div id="queue-bar">
        <span id="queue-status-dot" class="queue-dot idle"></span>
        <span id="queue-status-text">Ready</span>
        <span id="queue-badge">0 queued</span>
        <button id="queue-target-btn" title="Select target textarea on page">🎯 Target</button>
        <button id="queue-clear-btn" title="Clear prompt queue">✕ Clear</button>
      </div>
    </div>

    <!-- The actual hosted app iframe -->
    <iframe id="app-frame" src="http://localhost:3000/extension" allow="clipboard-write"></iframe>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
